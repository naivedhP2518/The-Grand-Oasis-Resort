<div class="luxury-page-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="luxury-card login-card">
    <div class="text-center mb-5">
      <h5 class="text-gold text-uppercase tracking-widest mb-2" style="font-size: 0.7rem; letter-spacing: 4px;">Welcome</h5>
      <h2 class="display-6 mb-3">Sign In</h2>
      <div class="luxury-divider"></div>
    </div>
    
    <p class="text-muted text-center mb-5 luxury-serif italic" style="font-size: 0.9rem;">
      "Enter your email to get access"
    </p>
    
    <form (ngSubmit)="onSubmit()">
      <div class="mb-5">
        <label for="email" class="luxury-label mb-2">Email Address</label>
        <input 
          type="email" 
          class="luxury-input" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="yourname@example.com"
          required
          [disabled]="loading"
        >
      </div>
      
      <div *ngIf="message" class="luxury-error mb-4">
        {{ message }}
      </div>

      <button 
        type="submit" 
        class="luxury-btn w-100 mt-2" 
        [disabled]="loading"
      >
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{'Request Access'}}
      </button>
    </form>
    
    <div class="mt-5 text-center">
      <p class="small text-muted mb-0">Experience exclusivity in every step.</p>
    </div>
  </div>
</div>
